<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TransitOps | Smart Transport Operations</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="background">

        <span class="blob blob-1"></span>
        <span class="blob blob-2"></span>
        <span class="grid"></span>

    </div>
    <div class="page">

        <header class="header">

            <div class="brand">

                <div class="logo">

                    <span></span>

                </div>

                <h1>

                    Welcome to

                    <strong>TransitOps</strong>

                </h1>

            </div>

        </header>
        
        <main>

            <section class="login-section">

                <article class="login-card">

                    <div class="card-header">

                        <h2>Sign In</h2>

                        <p>

                            Access your transport operations dashboard.

                        </p>

                    </div>


                    <form>

                        <div class="field">

                            <input
                                type="email"
                                id="email"
                                placeholder=" "
                                required>

                            <label for="email">

                                Email Address

                            </label>

                        </div>

                        <div class="field">

                            <input
                                type="password"
                                id="password"
                                placeholder=" "
                                required>

                            <label for="password">

                                Password

                            </label>

                        </div>

                        <div class="field">

                            <select id="role" required>

                                <option value="" disabled selected>

                                    Select Role

                                </option>

                                <option>

                                    Fleet Manager

                                </option>

                                <option>

                                    Dispatcher

                                </option>

                                <option>

                                    Safety Officer

                                </option>

                                <option>

                                    Financial Analyst

                                </option>

                            </select>

                        </div>

                        <div class="options">

                            <label class="remember">

                                <input type="checkbox">

                                <span>

                                    Remember Me

                                </span>

                            </label>

                            <a href="#">

                                Forgot Password?

                            </a>

                        </div>

                        <button type="submit">

                            Sign In

                        </button>

                    </form>

                </article>

            </section>

        </main>


        <footer>

            © 2026 TransitOps

        </footer>

    </div>

</body>

</html>
